<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>System Monitor</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>System Monitor</h1>

      <!-- Cards in a 2x2 grid; main.js fills in the values each tick. -->
      <section class="card">
        <h2>CPU Usage</h2>
        <div class="value"><span id="cpu-usage">--</span>%</div>
        <div class="bar"><div id="cpu-bar" class="bar-fill"></div></div>
      </section>

      <section class="card">
        <h2>CPU Temperature</h2>
        <div class="value"><span id="cpu-temp">--</span> °C</div>
      </section>

      <section class="card mem-card">
        <h2>Memory</h2>
        <div class="value">
          <span id="mem-used">--</span> / <span id="mem-total">--</span> GB
        </div>
        <div class="bar"><div id="mem-bar" class="bar-fill"></div></div>
        <canvas id="mem-chart"></canvas>
      </section>

      <section class="card">
        <h2>Settings</h2>
        <div class="value">
          <input id="update-rate" type="number" min="200" value="1000" /> ms
        </div>
        <div class="value">
          <input id="history-minutes" type="number" min="1" value="1" /> min history
        </div>
      </section>
    </main>

    <!-- UMD build exposes Chart as a global; main.js reads it like window.__TAURI__. -->
    <script src="/chart.umd.js"></script>
    <script type="module" src="/main.js"></script>
  </body>
</html>
